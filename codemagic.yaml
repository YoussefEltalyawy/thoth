workflows:
  ios-unsigned:
    name: Thoth iOS Unsigned Build (for SideStore)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20.11.0

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps

      - name: Prebuild native iOS project
        script: npx expo prebuild --platform ios --clean

      - name: Read app version
        script: |
          echo "VERSION=$(node -p "require('./app.json').expo.version")" >> $CM_ENV

      - name: Sync iOS version and build number
        script: |
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleShortVersionString $VERSION" \
            ios/Thoth/Info.plist

          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion $CM_BUILD_NUMBER" \
            ios/Thoth/Info.plist

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install

      - name: Build unsigned .app
        script: |
          cd ios
          xcodebuild \
            -workspace Thoth.xcworkspace \
            -scheme Thoth \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        script: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -R Thoth.app Payload/
          zip -r "$CM_BUILD_DIR/Thoth-v${VERSION}-b${CM_BUILD_NUMBER}.ipa" Payload

    artifacts:
      - Thoth-v*.ipa

    publishing:
      email:
        recipients:
          - talyayw@proton.me
        notify:
          success: true
          failure: true